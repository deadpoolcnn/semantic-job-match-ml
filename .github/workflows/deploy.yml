name: Build and Deploy to Server

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "scripts/**"
      - "data/**"
      - "requirements.txt"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 双层缓存策略：
          # 1. GHA cache：同一 runner 上的快速 layer 缓存（7天有效期）
          # 2. registry cache：GHA cache 过期后从上一次推送的镜像中恢复 layer 缓存
          cache-from: |
            type=gha
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/www/wwwroot/semantic-job-match-ml"
          overwrite: true

      - name: SSH & deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPO: ${{ github.repository }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_TOKEN,GH_ACTOR,GH_REPO,MOONSHOT_API_KEY
          script: |
            # Login to GHCR
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            cd /www/wwwroot/semantic-job-match-ml

            export IMAGE_NAME="ghcr.io/$GH_REPO:latest"
            export MOONSHOT_API_KEY="$MOONSHOT_API_KEY"

            # Pull latest image
            docker pull "$IMAGE_NAME"

            # Tag as local name so docker-compose can find it
            docker tag "$IMAGE_NAME" semantic-job-match:latest

            # Stop any legacy containers started with plain `docker run`
            # (docker compose --remove-orphans only manages compose-created containers)
            for name in semantic-job-match semantic-job-match-ml api worker; do
              docker stop "$name" 2>/dev/null && docker rm "$name" 2>/dev/null || true
            done

            # Bring up all services (redis + api + worker)
            # --no-build: use the pulled image, never rebuild from source on the server
            # --remove-orphans: remove old compose containers no longer in compose file
            MOONSHOT_API_KEY="$MOONSHOT_API_KEY" docker compose up -d --no-build --remove-orphans

            # Prune dangling images
            docker image prune -f

            # Verify API is healthy (allow extra time for Redis + model loading)
            sleep 20
            docker compose ps
            curl -f http://localhost:8000/health && echo "✅ Deployment successful!"
